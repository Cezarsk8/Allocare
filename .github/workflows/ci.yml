name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Allocore-backend/**'
            frontend:
              - 'Allocore-frontend/**'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore
        working-directory: Allocore-backend
      - name: Build
        run: dotnet build -c Release --no-restore
        working-directory: Allocore-backend

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Allocore-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: Allocore-frontend
      - name: Type check
        run: npm run type-check
        working-directory: Allocore-frontend
      - name: Lint
        run: npm run lint
        working-directory: Allocore-frontend
      - name: Build
        run: npm run build
        working-directory: Allocore-frontend
